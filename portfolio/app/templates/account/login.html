{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="{% static 'images/p_logo/favicon.ico' %}">

    <!-- Custom CSS -->
   <style>
    /* ===== GLOBAL STYLES ===== */
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #15121e, #232248);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* ===== LOGIN CARD ===== */
.login-card {
    color: #f0f3f6;
    width: 100%;
    max-width: 400px;
    padding: 30px;
    border-radius: 15px;

    /* Glass effect */
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);

    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

/* ===== TITLE ===== */
.login-title {
    text-align: center;
    margin-bottom: 25px;
    font-weight: bold;
    font-size: 24px;
    color: #f0f3f6;
}

/* ===== INPUT FIELDS ===== */
.form-control {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    padding: 10px;
}

/* Focus effect */
.form-control:focus {
    background: transparent;
    color: #fff;
    border: #e2e0e4;
    box-shadow: none;
}

.form-control::placeholder {
    color: rgba(255, 255, 255, 0.6) !important;
    opacity: 15%;
}

/* Placeholder styling */
input{
    border: 1px solid white !important;
}

/* ===== BUTTON ===== */
.btn-custom {
    background-color: transparent;
    color: white;
    border: 1px solid white;
    padding: 10px;
    border-radius: 8px;
    width: 100%;
}

/* Hover effect */
.btn-custom:hover {
    background-color: #322463;
    color: white;
}

/* ===== ALERTS ===== */
.alert {
    padding: 10px;
    font-size: 14px;
    border-radius: 8px;
    margin-bottom: 15px;
}

/* ===== OPTIONAL: SMALL SCREEN ===== */
@media (max-width: 480px) {
    .login-card {
        padding: 20px;
        margin: 10px;
    }

    .login-title {
        font-size: 20px;
    }
}
   </style>
</head>

<body>

    <div class="login-card">
        <h3 class="login-title">Login</h3>

        <form method="POST" action="{% url 'log_in' %}">
            {% csrf_token %}

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Entre Password" required>
            </div>

            <button type="submit" class="btn btn-custom w-100">Login</button>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
